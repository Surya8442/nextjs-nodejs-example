apiVersion: apps/v1
kind: Deployment
metadata:
  name: suryadeployimage
  labels:
    app: application
spec:
  replicas: 3
  selector:
    matchLabels:
      app: application
  template:
    metadata:
      labels:
        app: application
    spec:
      containers:
        - name: newcont
          image: surya8442/take_i:0.1
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: myservice
spec:
  selector:
    app: application
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30133
  type: NodePort
